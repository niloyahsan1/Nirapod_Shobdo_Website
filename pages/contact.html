<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Contact Us - Nirapod Shobdo</title>
	<link rel="stylesheet" href="../styles.css" />
	<!-- <link rel="shortcut icon" type="image/png" href="../assets/favicon.png" /> -->
	<link rel="shortcut icon" type="image/png" href="../favicon.ico">
	<link rel="icon" type="image/png" href="../assets/favicon.png" />
	<link
		href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
		rel="stylesheet" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
	<!-- Navigation Placeholder -->
	<div id="navbar-placeholder"></div>

	<!-- Page Banner -->
	<section class="page-banner">
		<div class="container">
			<h1>Contact Us</h1>
			<p>Have questions or feedback? We would love to hear from you.</p>
		</div>
	</section>

	<!-- Contact Section -->
	<section id="contact" class="contact" style="padding-top: 60px;">
		<div class="container">
			<div class="contact-content">
				<div class="contact-info">
					<div class="contact-item">
						<div class="contact-icon">
							<i class="fas fa-envelope"></i>
						</div>
						<div>
							<h4>Email</h4>
							<p>nirapodshobdo2025@gmail.com</p>
							<!-- <p>info@nirapodshobdo.com</p> -->
						</div>
					</div>
					<div class="contact-item">
						<div class="contact-icon">
							<i class="fas fa-phone"></i>
						</div>
						<div>
							<h4>Phone</h4>
							<p>+8801999124962</p>
							<!-- <p>+880 9876 543 210</p> -->
						</div>
					</div>
					<div class="contact-item">
						<div class="contact-icon">
							<i class="fas fa-map-marker-alt"></i>
						</div>
						<div>
							<h4>Address</h4>
							<!-- <p>123 Innovation Street</p> -->
							<p>Dhaka, Bangladesh 1216</p>
						</div>
					</div>
				</div>
				<div class="contact-form">
					<form id="contact-form">
						<div class="form-group">
							<input type="text" id="name" name="name" placeholder="Your Name" required />
						</div>
						<div class="form-group">
							<input type="email" id="email" name="email" placeholder="Your Email" required />
						</div>
						<div class="form-group">
							<input type="text" id="subject" name="subject" placeholder="Subject" required />
						</div>
						<div class="form-group">
							<textarea id="message" name="message" rows="5" placeholder="Your Message"
								required></textarea>
						</div>
						<button type="submit" class="btn btn-primary">
							<i class="fas fa-paper-plane"></i> Send Message
						</button>
					</form>
				</div>
			</div>
		</div>
	</section>

	<!-- Footer Placeholder -->
	<div id="footer-placeholder"></div>

	<!-- Mobile Bottom Navigation Placeholder -->
	<div id="mobile-nav-placeholder"></div>

	<!-- Scroll to Top Placeholder -->
	<div id="scroll-up-placeholder"></div>

	<script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
	<script src="../script.js"></script>
</body>

</html>
